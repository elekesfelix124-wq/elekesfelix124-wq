<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bro...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      background: #1b1b1b;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      text-align: center;
    }
    button {
      margin-top: 16px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #eee;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="text">bro,</div>
    <button id="nextBtn">&gt; Next</button>
  </div>

  <script>
    const lines = [
      "bro,",
      "so you accidentally tried to get scammed.",
      "i know, i know, you thought i got hacked.",
      "but i didnt.",
      "this was just a test.",
      "and you are not qualified! XD"
    ];

    let index = 0;
    const textEl = document.getElementById("text");
    const btn = document.getElementById("nextBtn");

    btn.addEventListener("click", () => {
      index++;
      if (index < lines.length) {
        textEl.textContent = lines[index];
      } else {
        btn.disabled = true;
        btn.textContent = "Done";
      }
    });
  </script>
</body>
</html>
